<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lhamascred — Motor de Portabilidade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='8' y='24' font-size='22' font-weight='900' fill='white'>L</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060A10;--sf:#0C1118;--card:#131A24;--brd:#1C2536;--acc:#3B82F6;--grn:#22C55E;--red:#EF4444;--ylw:#EAB308;--pur:#A78BFA;--org:#F97316;--pnk:#EC4899;--t1:#E2E8F0;--t2:#8896AB;--t3:#4A5568;--cyan:#06B6D4}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::selection{background:var(--acc);color:#000}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.fi{animation:fadeIn .35s ease both}.shake{animation:shake .3s ease}
button{font-family:inherit;cursor:pointer;transition:all .12s;border:none;background:none}button:hover{filter:brightness(1.15)}
input,select,textarea{font-family:inherit;outline:none}.rh:hover{background:rgba(59,130,246,0.03)!important}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:400px;animation:fadeIn .4s ease}
.login-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:36px}
.login-logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff}
.login-card{background:var(--sf);border:1px solid var(--brd);border-radius:16px;padding:36px 32px}
.form-group{margin-bottom:18px}.form-label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:13px}.form-input:focus{border-color:var(--acc)}
.login-btn{width:100%;padding:12px;border-radius:8px;background:var(--acc);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:14px;min-height:18px}
.header{background:var(--sf);border-bottom:1px solid var(--brd);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--pur));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.hdr-user{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:6px;background:var(--card);border:1px solid var(--brd);margin-right:6px}
.hdr-user-icon{width:22px;height:22px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.btn{padding:5px 13px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid var(--brd);color:var(--t2);background:transparent}
.btn-grn{border-color:var(--grn);color:var(--grn)}.btn-red{border-color:var(--red);color:var(--red)}.btn-cyan{border-color:var(--cyan);color:var(--cyan)}
.btn-acc{background:var(--acc);color:#fff;border:none;padding:9px 24px;border-radius:8px;font-size:12px;font-weight:700}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px}
.container{max-width:1440px;margin:0 auto;padding:20px 24px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--sf);border:1px solid var(--brd);border-radius:14px;padding:28px;max-width:560px;width:100%;animation:fadeIn .25s ease;max-height:90vh;overflow-y:auto}
.table-wrap{background:var(--card);border-radius:10px;border:1px solid var(--brd);overflow:hidden}
.table-scroll{overflow:auto;max-height:62vh}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card);z-index:2;white-space:nowrap}
td{padding:7px 12px;font-size:12px;color:var(--t1);border-bottom:1px solid var(--brd);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
td.right,th.right{text-align:right}td.mono{font-family:monospace;font-size:11px}
.pill{display:inline-block;padding:2px 9px;border-radius:5px;font-size:10px;font-weight:700}
.pill-default{background:rgba(255,255,255,.05);color:var(--t2)}.pill-acc{background:rgba(59,130,246,.1);color:var(--acc)}.pill-pur{background:rgba(167,139,250,.1);color:var(--pur)}.pill-ylw{background:rgba(234,179,8,.1);color:var(--ylw)}.pill-grn{background:rgba(34,197,94,.12);color:var(--grn)}.pill-red{background:rgba(239,68,68,.1);color:var(--red)}.pill-org{background:rgba(249,115,22,.12);color:var(--org)}.pill-pnk{background:rgba(236,72,153,.12);color:var(--pnk)}.pill-cyan{background:rgba(6,182,212,.12);color:var(--cyan)}
.pager{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--brd);background:var(--sf);font-size:11px}
.pager-btns{display:flex;gap:3px;align-items:center}.pager-btns button{padding:3px 9px;border-radius:4px;border:1px solid var(--brd);background:var(--card);color:var(--t2);font-size:12px}
.search-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-bar input{padding:7px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:12px;width:220px}
.search-bar select{padding:7px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--sf);color:var(--t1);font-size:12px}
.kpi-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--brd);flex:1 1 150px;min-width:130px}
.kpi-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600}.kpi-value{font-size:17px;font-weight:800}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--sf);border-radius:9px;padding:3px;border:1px solid var(--brd);flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;font-weight:700;font-size:11px;color:var(--t2)}.tab.active{background:var(--acc);color:#fff}
.tab-badge{margin-left:4px;padding:0 5px;border-radius:3px;font-size:9px}.tab.active .tab-badge{background:rgba(255,255,255,.2)}.tab:not(.active) .tab-badge{background:var(--brd)}
.upload-box{border:2px dashed var(--brd);border-radius:16px;padding:56px 44px;text-align:center;cursor:pointer;background:var(--sf);max-width:480px;width:100%}.upload-box:hover,.upload-box.drag{border-color:var(--acc)}
.mapa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.rmc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.taxa-bar{height:6px;border-radius:3px;background:var(--brd);overflow:hidden}.taxa-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--acc),var(--pur))}
/* Pipeline */
.pipe-stages{display:flex;gap:4px;margin-bottom:20px;align-items:center}
.pipe-stage{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--brd);background:var(--card);color:var(--t2);transition:all .15s}
.pipe-stage.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.pipe-stage .pipe-n{margin-left:6px;padding:1px 6px;border-radius:4px;font-size:9px}
.pipe-stage.active .pipe-n{background:rgba(255,255,255,.2)}
.pipe-stage:not(.active) .pipe-n{background:var(--brd)}
.pipe-arrow{color:var(--t3);font-size:16px}
/* Checkbox */
.chk{width:16px;height:16px;accent-color:var(--acc);cursor:pointer}
/* WPP template */
.wpp-tpl{width:100%;min-height:100px;padding:12px;border-radius:8px;border:1px solid var(--brd);background:var(--card);color:var(--t1);font-size:13px;resize:vertical}
.wpp-vars{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.wpp-var{padding:3px 8px;border-radius:4px;background:var(--card);border:1px solid var(--brd);font-size:10px;color:var(--cyan);cursor:pointer}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}.rmc-grid,.mapa-grid{grid-template-columns:1fr}.container{padding:12px}.header{padding:0 12px}.pipe-stages{flex-wrap:wrap}}
</style>
</head>
<body>
<div id="loginScreen" class="login-wrap"><div class="login-box"><div class="login-logo"><div class="login-logo-icon">L</div><div><div style="font-size:22px;font-weight:800">Lhamascred</div><div style="font-size:11px;color:var(--t3)">Motor de Portabilidade</div></div></div><div class="login-card" id="loginCard"><div style="font-size:18px;font-weight:700;text-align:center;margin-bottom:4px">Bem-vindo</div><div style="font-size:12px;color:var(--t2);text-align:center;margin-bottom:28px">Entre com suas credenciais</div><div class="form-group"><label class="form-label">Usuário</label><input class="form-input" type="text" id="loginUser" placeholder="Usuário" onkeydown="if(event.key==='Enter')doLogin()"></div><div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="loginPass" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()"></div><button class="login-btn" onclick="doLogin()">Entrar</button><div class="login-error" id="loginError"></div></div></div></div>
<div id="appScreen" style="display:none"><header class="header"><div class="logo" style="cursor:pointer" onclick="resetData()"><div class="logo-icon">L</div><div><div style="font-size:14px;font-weight:800">Lhamascred</div><div style="font-size:9px;color:var(--t3);font-weight:600">Motor v5</div></div></div><div style="display:flex;align-items:center;gap:6px"><div class="hdr-user" id="hdrUser"></div><div id="headerActions" style="display:flex;gap:6px;align-items:center"><span id="fileName" style="font-size:10px;color:var(--t3);margin-right:4px"></span><button class="btn btn-grn" onclick="exportXLSX()">↓ Exportar</button><button class="btn" style="border-color:var(--ylw);color:var(--ylw)" onclick="salvarProc()">💾 Salvar</button><button class="btn" onclick="resetData()">Nova Base</button></div><button class="btn btn-red btn-sm" onclick="doLogout()">Sair</button></div></header><div class="container" id="appContainer"></div></div>
<div id="changePwModal" class="modal-overlay" style="display:none"><div class="modal-box" style="max-width:420px"><div style="font-size:16px;font-weight:700;margin-bottom:16px">Alterar Senha</div><div class="form-group"><label class="form-label">Atual</label><input class="form-input" type="password" id="cpwOld"></div><div class="form-group"><label class="form-label">Nova</label><input class="form-input" type="password" id="cpwNew"></div><div class="form-group"><label class="form-label">Confirmar</label><input class="form-input" type="password" id="cpwConfirm"></div><div style="display:flex;gap:8px"><button class="login-btn" style="flex:1" onclick="doChangePw()">Salvar</button><button class="btn" style="padding:12px 20px" onclick="document.getElementById('changePwModal').style.display='none'">Cancelar</button></div><div class="login-error" id="cpwError"></div></div></div>
<div id="phoneModal" class="modal-overlay" style="display:none"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:16px;font-weight:700">📱 Telefones</div><button class="btn btn-sm" onclick="document.getElementById('phoneModal').style.display='none'">✕</button></div><div id="pmName" style="font-size:13px;color:var(--t2);margin-bottom:2px"></div><div id="pmCPF" style="font-size:11px;color:var(--t3);margin-bottom:14px;font-family:monospace"></div><div id="pmContent"></div><div id="pmActions" style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap"></div></div></div>
<div id="batchModal" class="modal-overlay" style="display:none"><div class="modal-box" style="max-width:420px"><div style="font-size:16px;font-weight:700;margin-bottom:12px">⏳ Processando</div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span id="bCnt" style="font-size:12px;color:var(--t2)">0/0</span><span id="bPct" style="font-size:12px;font-weight:700;color:var(--acc)">0%</span></div><div class="taxa-bar" style="height:8px"><div id="bBar" class="taxa-fill" style="width:0%"></div></div><div id="bStat" style="font-size:11px;color:var(--t2);margin:10px 0"></div><button class="btn btn-red" onclick="bCancel=true">Cancelar</button></div></div>
<div id="wppModal" class="modal-overlay" style="display:none"><div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:700">💬 Mensagem WhatsApp</div><button class="btn btn-sm" onclick="document.getElementById('wppModal').style.display='none'">✕</button></div><div class="form-group"><label class="form-label">Template da Mensagem</label><textarea class="wpp-tpl" id="wppTpl">Olá {nome}, tudo bem? Aqui é da Lhamascred! Identificamos {qtd} oportunidade(s) de portabilidade com troco total de {troco}. Podemos conversar?</textarea></div><div class="form-group"><label class="form-label">Variáveis Disponíveis</label><div class="wpp-vars"><span class="wpp-var" onclick="insertVar('{nome}')">nome</span><span class="wpp-var" onclick="insertVar('{cpf}')">cpf</span><span class="wpp-var" onclick="insertVar('{troco}')">troco</span><span class="wpp-var" onclick="insertVar('{vlr_contrato}')">vlr_contrato</span><span class="wpp-var" onclick="insertVar('{banco}')">banco</span><span class="wpp-var" onclick="insertVar('{destino}')">destino</span><span class="wpp-var" onclick="insertVar('{qtd}')">qtd_contratos</span></div></div><div id="wppPreview" style="background:var(--card);border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid var(--brd)"><div style="font-size:10px;color:var(--t3);margin-bottom:6px">PRÉ-VISUALIZAÇÃO</div><div id="wppPreviewText" style="font-size:13px;line-height:1.5"></div></div><div id="wppTargetInfo" style="font-size:12px;color:var(--t2);margin-bottom:14px"></div><div style="display:flex;gap:8px"><button class="btn-acc" style="flex:1" onclick="sendWppBatch()">💬 Enviar para Todos</button><button class="btn btn-grn" onclick="exportWppList()">↓ Exportar Lista</button></div></div></div>

<script>
// ══════ AUTH ══════
function hp(p){let h=0;const s=p+"lhamas2024";for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return"H"+Math.abs(h).toString(36)}
function getU(){try{return JSON.parse(localStorage.getItem("lhm_users"))}catch{return null}}
function saveU(u){localStorage.setItem("lhm_users",JSON.stringify(u))}
function initU(){let u=getU();if(!u){u=[{id:1,user:"admin",name:"Administrador",pw:hp("admin123"),role:"admin",created:Date.now()},{id:2,user:"operador",name:"Operador",pw:hp("op123"),role:"user",created:Date.now()}];saveU(u)}return u}
function getSess(){try{let s=JSON.parse(localStorage.getItem("lhm_sess"));if(!s||Date.now()-s.ts>864e5)return null;return s}catch{return null}}
let CU=null;
function doLogin(){const u=document.getElementById("loginUser").value.trim().toLowerCase(),p=document.getElementById("loginPass").value,err=document.getElementById("loginError");if(!u||!p){err.textContent="Preencha todos os campos";return}const users=initU(),f=users.find(x=>x.user.toLowerCase()===u&&x.pw===hp(p));if(!f){err.textContent="Usuário ou senha incorretos";document.getElementById("loginCard").classList.add("shake");setTimeout(()=>document.getElementById("loginCard").classList.remove("shake"),350);return}CU=f;localStorage.setItem("lhm_sess",JSON.stringify({user:f.user,name:f.name,role:f.role,ts:Date.now()}));showApp()}
function doLogout(){localStorage.removeItem("lhm_sess");CU=null;document.getElementById("appScreen").style.display="none";document.getElementById("loginScreen").style.display="flex";S={data:null,tab:"dash",q:"",sort:{c:null,d:"asc"},pg:0,rmcF:"ALL",fname:"",pipeStage:"sel"}}
function showApp(){document.getElementById("loginScreen").style.display="none";document.getElementById("appScreen").style.display="block";document.getElementById("hdrUser").innerHTML=`<div class="hdr-user-icon">${CU.name.charAt(0)}</div><div><div style="font-size:11px;font-weight:600">${esc(CU.name)}</div><div style="font-size:9px;color:var(--t3)">${CU.role==="admin"?"Admin":"Op"}</div></div><button class="btn btn-sm" onclick="document.getElementById('changePwModal').style.display='flex'" style="margin-left:4px;font-size:9px">🔑</button>`;renderApp()}
function doChangePw(){const o=document.getElementById("cpwOld").value,n=document.getElementById("cpwNew").value,c=document.getElementById("cpwConfirm").value,err=document.getElementById("cpwError");if(!o||!n||!c){err.textContent="Preencha tudo";return}if(hp(o)!==CU.pw){err.textContent="Incorreta";return}if(n.length<4){err.textContent="Mín 4";return}if(n!==c){err.textContent="Não conferem";return}let users=getU();let i=users.findIndex(u=>u.user===CU.user);if(i>=0){users[i].pw=hp(n);saveU(users);CU.pw=hp(n)}err.style.color="var(--grn)";err.textContent="Alterada!";setTimeout(()=>document.getElementById("changePwModal").style.display="none",1000)}

// ══════ HISTORY ══════
function getHist(){try{return JSON.parse(localStorage.getItem("lhm_hist")||"[]")}catch{return[]}}
function getMyHist(){let h=getHist();if(!CU)return[];if(CU.role==="admin")return h;return h.filter(x=>x.userLogin===CU.user)}
function saveHist(h){try{localStorage.setItem("lhm_hist",JSON.stringify(h.slice(0,50)))}catch{}}
function addHist(fn,sm){let h=getHist();h.unshift({id:Date.now(),fname:fn,user:CU?CU.name:"",userLogin:CU?CU.user:"",date:new Date().toLocaleString("pt-BR"),summary:sm,saved:false});saveHist(h)}
function delHist(id){localStorage.removeItem("lhm_data_"+id);saveHist(getHist().filter(x=>x.id!==id));renderApp()}
function clearHist(){if(confirm("Limpar?")){let h=getMyHist();h.forEach(x=>localStorage.removeItem("lhm_data_"+x.id));let all=getHist();let ids=new Set(h.map(x=>x.id));saveHist(all.filter(x=>!ids.has(x.id)));renderApp()}}
function salvarProc(){
  if(!S.data)return;let hist=getHist();let cur=hist.find(h=>h.userLogin===CU.user&&!h.saved)||hist.find(h=>h.userLogin===CU.user);if(!cur)return;
  try{let sv={elegiveis:S.data.elegiveis,mapaArr:S.data.mapaArr,rmcRcc:S.data.rmcRcc,taxaDist:S.data.taxaDist,aLen:S.data.analise.length,phones:{}};
    for(let k of Object.keys(phoneCache))sv.phones[k]=phoneCache[k];
    localStorage.setItem("lhm_data_"+cur.id,JSON.stringify(sv));cur.saved=true;saveHist(hist);alert("Salvo! Consulte no Histórico.");renderApp();
  }catch(e){try{let m={elegiveis:S.data.elegiveis.slice(0,1500),mapaArr:S.data.mapaArr,aLen:S.data.analise.length,phones:{}};
    for(let k of Object.keys(phoneCache))m.phones[k]=phoneCache[k];localStorage.setItem("lhm_data_"+cur.id,JSON.stringify(m));cur.saved=true;saveHist(hist);alert("Salvo (parcial).");renderApp();
  }catch{alert("Sem espaço. Limpe processamentos antigos.")}}
}
function loadHist(id){try{let raw=localStorage.getItem("lhm_data_"+id);if(!raw){alert("Não salvo. Clique 💾 Salvar antes.");return}
  let sv=JSON.parse(raw);if(sv.phones)for(let k of Object.keys(sv.phones))phoneCache[k]=sv.phones[k];
  // Build analise as array with proper length for dashboard
  let eleg=sv.elegiveis||[];
  S.data={analise:eleg,elegiveis:eleg,mapaArr:sv.mapaArr||[],rmcRcc:sv.rmcRcc||[],taxaDist:sv.taxaDist||{},totalAnalise:sv.aLen||eleg.length};
  let hist=getHist(),h=hist.find(x=>x.id===id);S.fname=h?h.fname+" (histórico)":"Histórico";S.tab="dash";S.pg=0;renderApp();
  alert("✅ Processamento carregado com "+eleg.length+" elegíveis"+(Object.keys(sv.phones||{}).length?" e "+Object.keys(sv.phones).length+" telefones higienizados":""));
}catch(e){alert("Erro ao carregar: "+e.message)}}

// ══════ PIPELINE STATE ══════
let selected=new Set(); // CPFs selected for pipeline
let phoneCache={}; // Hygienized phone data
let wppSent=new Set(); // CPFs with WPP sent
let bCancel=false;
let phoneMode="base"; // "base"=telefone da planilha, "api"=NovaVida (tem custo)

function toggleSel(cpf){if(selected.has(cpf))selected.delete(cpf);else selected.add(cpf);renderApp()}
function toggleSelAll(){if(!S.data)return;let all=S.data.elegiveis.map(e=>e.cpf);if(selected.size>=all.length){selected.clear()}else{all.forEach(c=>selected.add(c))}renderApp()}
function selPage(){
  if(!S.data)return;let filtered=filt(S.data.elegiveis);
  let pageItems=filtered.slice(S.pg*PER,(S.pg+1)*PER);

function groupByCPF(items){
  let map={};
  for(let r of items){
    if(!map[r.cpf]){map[r.cpf]={cpf:r.cpf,nome:r.nome,t1:r.t1||"",t2:r.t2||"",t3:r.t3||"",contratos:[],qtd:0,trocoTotal:0,vcTotal:0,bancos:new Set()}}
    let g=map[r.cpf];g.contratos.push(r);g.qtd++;g.trocoTotal+=r.troco;g.vcTotal+=r.vc;g.bancos.add(r.dest);
  }
  return Object.values(map).sort((a,b)=>b.trocoTotal-a.trocoTotal);
}

const COEFS=[{t:1.85,c:0.02299},{t:1.80,c:0.02451},{t:1.78,c:0.02250},{t:1.75,c:0.021985},{t:1.72,c:0.02175},{t:1.70,c:0.021604},{t:1.68,c:0.02145},{t:1.66,c:0.02130}];
const BD={QUALI:{sMin:2000,tMin:250,pMin:0,pgMin:0,faixa:null,coefF:null,block:["359","246","025","047","063","070","320","394","422","654","212","626","935","753","330","149","012","752","082","079","329","643","243"]},FACTA:{sMin:0,tMin:100,pMin:50,pgMin:0,faixa:[1.70,1.85],coefF:null,block:["070","071","925","935","149","012","611","643","917"]},BRB:{sMin:3000,tMin:250,pMin:0,pgMin:0,faixa:null,coefF:0.02130,block:["070","623","935","149","012","071","925","380","079"]},DIGIO:{sMin:4500,tMin:250,pMin:0,pgMin:12,faixa:null,coefF:null,block:["237","001","041"]}};
const ORDEM=["QUALI","FACTA","BRB","DIGIO"],B1P=["149","422","739","925","380","033","326","290","041","389","121"],ESP_INV=[4,5,6,32,33,34,51,83,92],CARTAO={PAN:"623",BMG:"318",Daycoval:"707"};
function pV(v){if(v==null||v==="")return 0;if(typeof v==="number")return v;let s=String(v).replace(/R\$\s*/g,"").replace(/\s/g,"");if(s.includes(","))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;if(s.includes("."))return parseFloat(s)||0;let n=parseInt(s,10);return isNaN(n)?0:n>99?n/100:n}
function pP(v){if(v==null||v==="")return[0,0,0];let m=String(v).match(/(\d+)\s*[/\\]\s*(\d+)/);if(m){let r=+m[1],t=+m[2];return[r,t,t-r]}let n=parseInt(v,10);return[n||0,n||0,0]}
function pC(v){if(v==null||v==="")return"";return String(typeof v==="number"?Math.floor(v):v).trim().padStart(3,"0")}
function pEN(e){if(!e)return 0;let m=String(e).match(/^(\d+)/);return m?parseInt(m[1],10):0}
function cAge(ns){if(ns==null)return null;let d;if(ns instanceof Date)d=ns;else if(typeof ns==="number")d=new Date((ns-25569)*864e5);else{let s=String(ns).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),a=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))a--;return{age:a}}
function cBY(dib){if(dib==null)return null;let d;if(dib instanceof Date)d=dib;else if(typeof dib==="number")d=new Date((dib-25569)*864e5);else{let s=String(dib).trim(),m=s.match(/(\d{2})[/-](\d{2})[/-](\d{4})/);if(m)d=new Date(+m[3],+m[2]-1,+m[1]);else d=new Date(s)}if(!d||isNaN(d.getTime()))return null;let now=new Date(),y=now.getFullYear()-d.getFullYear();if(now.getMonth()<d.getMonth()||(now.getMonth()===d.getMonth()&&now.getDate()<d.getDate()))y--;return y}
function bestR(p,s,t,fx){let pool=fx?COEFS.filter(c=>c.t>=fx[0]&&c.t<=fx[1]):COEFS;for(let{t:tx,c}of pool){let vc=p/c,tr=vc-s;if(tr>=t)return{t:tx,c,vc,tr}}return null}
function testar(p,s,pg,cd,inv,age,bY,rest){let i1=B1P.includes(cd);for(let b of ORDEM){let r=BD[b];if(r.block.includes(cd))continue;if(r.pMin&&p<r.pMin)continue;if(r.sMin&&s<r.sMin)continue;let pgR=i1?1:r.pgMin;if(pgR&&pg<pgR)continue;if(inv&&age!==null){if(age<55)continue;if(age>=55&&age<=57&&(bY===null||bY<15))continue;if(rest>0&&rest>(75-age)*12)continue}if(r.coefF){let vc=p/r.coefF,tr=vc-s;if(tr<r.tMin)continue;let tx=COEFS.find(x=>x.c===r.coefF);return{banco:b,troco:tr,vc,taxa:tx?tx.t:0,i1}}let res=bestR(p,s,r.tMin,r.faixa);if(res)return{banco:b,troco:res.tr,vc:res.vc,taxa:res.t,i1}}return null}
function findAllPos(H,nm){let r=[],n=nm.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();for(let i=0;i<H.length;i++){let h=String(H[i]||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();if(h===n)r.push(i)}return r}
function findFirst(H,ns){for(let nm of ns){let n=nm.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();for(let i=0;i<H.length;i++){let h=String(H[i]||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();if(h===n)return i}}return-1}
function processar(data){
  if(!data||data.length<2)return null;let H=data[0].map(h=>h?String(h).trim():""),rows=data.slice(1);
  let cNm=findFirst(H,["Nome"]),cCP=findFirst(H,["CPF"]),cBn=findFirst(H,["Beneficio"]),cEs=findFirst(H,["Especie"]),cNs=findFirst(H,["Data Nascimento"]),cDI=findFirst(H,["DIB"]),cT1=findFirst(H,["Telefone1"]),cT2=findFirst(H,["Telefone2"]),cT3=findFirst(H,["Telefone3"]);
  let allTE=findAllPos(H,"Tipo Emprestimo"),allCon=findAllPos(H,"Contrato"),allCod=findAllPos(H,"Codigo"),allVE=findAllPos(H,"Valor Emprestimo"),allMC=findAllPos(H,"Margem Cartao"),allVP=findAllPos(H,"Valor Parcela"),allPr=findAllPos(H,"Prazo"),allSQ=findAllPos(H,"Saldo Quitacao");
  let cardBlocks=[];for(let te of allTE){let mc=allMC.find(m=>m>te&&m<te+8);if(mc!==undefined)cardBlocks.push(te)}

  if(cardBlocks.length>=2){let te=cardBlocks[1];rccB={tipo:te,con:allCon.find(c=>c>te&&c<te+8),cod:allCod.find(c=>c>te&&c<te+8),val:allVE.find(v=>v>te&&v<te+8)}}
  let lbs=[];for(let vp of allVP){let con=allCon.filter(c=>c<vp).pop(),cod=allCod.find(c=>c>con-1&&c<vp),prz=allPr.find(p=>p>vp&&p<vp+4),sq=allSQ.find(s=>s>vp&&s<vp+5);if(con!==undefined)lbs.push({cc:con,ck:cod,cp:vp,cz:prz,cs:sq})}
  let analise=[],elegiveis=[],rmcAll=[];
  let g=(r,c)=>c!=null&&c>=0&&r[c]!=null?String(r[c]).trim():"",gv=(r,c)=>c!=null&&c>=0?pV(r[c]):0,gr=(r,c)=>c!=null&&c>=0?r[c]:null;
  for(let row of rows){
    let nome=g(row,cNm),cpf=g(row,cCP);if(!nome&&!cpf)continue;
    let ben=g(row,cBn),esp=g(row,cEs),t1=g(row,cT1),t2=g(row,cT2),t3=g(row,cT3);
    let eN=pEN(esp),isInv=ESP_INV.includes(eN),ai=cAge(gr(row,cNs)),idade=ai?ai.age:null,bY=cBY(gr(row,cDI));
    let tRmc=rmcB?g(row,rmcB.tipo):"",cRmc=rmcB?pC(gr(row,rmcB.cod)??""):"",vRmc=rmcB?gv(row,rmcB.val):0;

    if(tRmc.toUpperCase().includes("RMC")||tRcc.toUpperCase().includes("RCC")||vRmc>0||vRcc>0)rmcAll.push({nome,cpf,ben,esp,t1,t2,t3,tRmc,cRmc,vRmc:Math.round(vRmc*100)/100,tRcc,cRcc,vRcc:Math.round(vRcc*100)/100});

}

function detectTipo(v){let d=v.replace(/\D/g,"");if(d.length===11)return"cpf";if(d.length>=1)return"ben";return""}
function updMcLabel(){let inp=document.getElementById("mcBenInput");let lbl=document.getElementById("mcTipoLabel");if(!inp||!lbl)return;let v=inp.value.replace(/\D/g,"");let t=detectTipo(inp.value);if(t==="cpf")lbl.innerHTML=`<span style="color:var(--cyan)">📋 Detectado: <strong>CPF</strong> (${v.substring(0,3)}.${v.substring(3,6)}.${v.substring(6,9)}-${v.substring(9)})</span>`;else if(t==="ben")lbl.innerHTML=`<span style="color:var(--grn)">🔢 Detectado: <strong>Benefício</strong></span>`;else lbl.innerHTML=""}
function mcToRows(resp){
  // Convert API response to flat rows — handle multiple response formats
  let d=resp.data||resp;
  // If response is array, merge objects
  if(Array.isArray(d)){let merged={};d.forEach(o=>Object.assign(merged,o));d=merged}
  // If response is string, try parsing
  if(typeof d==="string"){try{d=JSON.parse(d)}catch{}}

  let b=d.Beneficiario||d.beneficiario||{};
  let rf=d.ResumoFinanceiro||d.resumoFinanceiro||{};
  let db=d.DadosBancarios||d.dadosBancarios||{};
  let rmc=d.Rmc||d.rmc||d.RMC||{};
  let rcc=d.RCC||d.Rcc||d.rcc||{};
  let emps=d.Emprestimos||d.emprestimos||[];
  // If emps is not array (single object), wrap it
  if(emps&&!Array.isArray(emps))emps=[emps];

  let base={
    nome:b.Nome||b.nome||"",cpf:b.CPF||b.cpf||"",ben:String(b.Beneficio||b.beneficio||""),esp:String(b.Especie||b.especie||""),
    nasc:b.DataNascimento||b.dataNascimento||"",dib:b.DIB||b.dib||"",t1:"",t2:"",t3:"",
    rmcBanco:String(rmc.Banco||rmc.banco||""),rmcValor:parseFloat(rmc.Valor_emprestimo||rmc.valor_emprestimo||0),rmcContrato:rmc.Contrato||"",
    rccBanco:String(rcc.Banco||rcc.banco||""),rccValor:parseFloat(rcc.Valor_emprestimo||rcc.valor_emprestimo||0),rccContrato:rcc.Contrato||""
  };
  let ai=cAge(base.nasc),idade=ai?ai.age:null;
  let bY=cBY(base.dib);
  let eN=parseInt(base.esp)||0;
  let isInv=ESP_INV.includes(eN);
  let rmcEntry=null;
  if(base.rmcValor>0||base.rccValor>0){
    rmcEntry={nome:base.nome,cpf:base.cpf,ben:base.ben,esp:base.esp,t1:"",t2:"",t3:"",
      tRmc:"RMC",cRmc:pC(base.rmcBanco),vRmc:base.rmcValor,
      tRcc:"RCC",cRcc:pC(base.rccBanco),vRcc:base.rccValor};
  }
  let rows=[];
  for(let emp of emps){
    let par=parseFloat(emp.ValorParcela||emp.valorParcela||emp.valor_parcela||0);
    let sal=parseFloat(emp.Quitacao||emp.quitacao||emp.SaldoQuitacao||emp.saldo_quitacao||0);
    let prazoStr=String(emp.Prazo||emp.prazo||"0");
    let restStr=String(emp.ParcelasRestantes||emp.parcelasRestantes||emp.parcelas_restantes||"0");
    let rest=parseInt(restStr)||0;
    let tot=parseInt(prazoStr)||0;
    let pag=tot>rest?tot-rest:0;
    let cod=pC(String(emp.Banco||emp.banco||""));
    let con=String(emp.Contrato||emp.contrato||"");
    let is1p=B1P.includes(cod);
    let res=testar(par,sal,pag,cod,isInv,idade,bY,rest);
    rows.push({
      nome:base.nome,cpf:base.cpf,ben:base.ben,esp:base.esp,con,cod,
      par:Math.round(par*100)/100,sal:Math.round(sal*100)/100,
      prazo:`${rest}/${tot}`,pag,idade:idade??"-",isInv,is1p,
      dest:res?res.banco:"-",troco:res?Math.round(res.troco*100)/100:0,
      vc:res?Math.round(res.vc*100)/100:0,taxa:res?res.taxa:"-",ok:!!res,
      t1:"",t2:"",t3:""
    });
  }
  return{rows,rmcEntry};
}

async function consultarBeneficio(){
  let inp=document.getElementById("mcBenInput");
  if(!inp)return;
  let raw=inp.value.replace(/\D/g,"").trim();
  if(!raw){alert("Digite um CPF ou número de benefício");return}
  let tipo=detectTipo(inp.value);
  let label=tipo==="cpf"?`CPF ${raw.substring(0,3)}.***.***-${raw.substring(9)}`:`Benefício ${raw}`;

  document.getElementById("batchModal").style.display="flex";
  document.getElementById("bCnt").textContent="1/1";
  document.getElementById("bPct").textContent="...";
  document.getElementById("bBar").style.width="50%";
  document.getElementById("bStat").textContent=`Consultando ${label}...`;

  try{
    const res=await fetch('/api/multicorban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({beneficio:raw})});
    if(!res.ok){
      let errTxt=await res.text().catch(()=>"");
      document.getElementById("batchModal").style.display="none";
      alert(`Erro HTTP ${res.status}\n${errTxt.substring(0,200)}`);
      return;
    }
    const data=await res.json();
    if(!data.success||!data.data){
      document.getElementById("batchModal").style.display="none";
      alert(`Erro: ${data.error||data.detail||"Resposta inválida"}`);
      return;
    }

    let{rows,rmcEntry}=mcToRows(data);
    let elegiveis=rows.filter(r=>r.ok);
    let allRmc=rmcEntry?[rmcEntry]:[];

    if(rows.length===0){
      document.getElementById("batchModal").style.display="none";
      let nome=data.data.Beneficiario?data.data.Beneficiario.Nome:"";
      alert(`${label}${nome?" — "+nome:""}\nNenhum contrato encontrado.`);
      return;
    }

    let mapa={};
    for(let e of elegiveis){
      if(!mapa[e.dest])mapa[e.dest]={banco:e.dest,n:0,total:0,vcTotal:0};
      mapa[e.dest].n++;mapa[e.dest].total+=e.troco;mapa[e.dest].vcTotal+=e.vc;
    }
    let mapaArr=ORDEM.map(b=>mapa[b]||{banco:b,n:0,total:0,vcTotal:0}).filter(m=>m.n>0).map(m=>({...m,med:m.n?m.total/m.n:0,vcMed:m.n?m.vcTotal/m.n:0}));
    let taxaDist={};for(let e of elegiveis)taxaDist[e.taxa]=(taxaDist[e.taxa]||0)+1;

    S.data={analise:rows,elegiveis,mapaArr,rmcRcc:allRmc,taxaDist};
    let nome=rows[0]?rows[0].nome:"";
    let ben=rows[0]?rows[0].ben:raw;
    S.fname=`${tipo==="cpf"?"CPF":"Ben"} ${ben}${nome?" — "+nome:""}`;
    S.tab="dash";S.pg=0;
    selected.clear();phoneCache={};wppSent.clear();

    let tT=elegiveis.reduce((s,e)=>s+e.troco,0);
    let tVC=elegiveis.reduce((s,e)=>s+e.vc,0);
    addHist(S.fname,{contratos:rows.length,elegiveis:elegiveis.length,troco:tT,valorContrato:tVC,rmcRcc:allRmc.length,beneficios:[ben],tipo});

    document.getElementById("bPct").textContent="100%";
    document.getElementById("bBar").style.width="100%";
    document.getElementById("bStat").innerHTML=`<span style="color:var(--grn)">✅ ${nome} — ${rows.length} contratos, ${elegiveis.length} elegíveis</span>`;
    setTimeout(()=>{document.getElementById("batchModal").style.display="none";renderApp()},1200);

  }catch(e){
    document.getElementById("batchModal").style.display="none";
    alert(`Erro de conexão: ${e.message}\n\nVerifique se o arquivo api/multicorban.js existe no GitHub.`);
  }
}

    html+=`<div class="search-bar"><input type="text" placeholder="Buscar..." value="${esc(S.q)}" oninput="setQ(this.value)"><select onchange="S.rmcF=this.value;S.pg=0;renderApp()"><option value="ALL"${S.rmcF==="ALL"?" selected":""}>Todos</option><option value="PAN"${S.rmcF==="PAN"?" selected":""}>PAN</option><option value="BMG"${S.rmcF==="BMG"?" selected":""}>BMG</option><option value="DAYCOVAL"${S.rmcF==="DAYCOVAL"?" selected":""}>Daycoval</option></select></div>`;
    html+=`<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Nome</th><th>CPF</th><th>Espécie</th><th>Tel 1</th><th>Tipo RMC</th><th>Banco RMC</th><th class="right">Valor RMC</th><th>Tipo RCC</th><th>Banco RCC</th><th class="right">Valor RCC</th></tr></thead><tbody>`;
    for(let r of items)html+=`<tr class="rh"><td>${esc(r.nome)}</td><td class="mono">${esc(r.cpf)}</td><td>${esc(r.esp)}</td><td class="mono">${esc(r.t1)}</td><td>${esc(r.tRmc)}</td><td><span class="pill pill-default">${esc(r.cRmc)}</span></td><td class="right mono" style="color:${r.vRmc>0?"var(--grn)":"var(--t3)"}">${r.vRmc>0?R$(r.vRmc):"—"}</td><td>${esc(r.tRcc)}</td><td><span class="pill pill-default">${esc(r.cRcc)}</span></td><td class="right mono" style="color:${r.vRcc>0?"var(--pur)":"var(--t3)"}">${r.vRcc>0?R$(r.vRcc):"—"}</td></tr>`;
    if(!items.length)html+=`<tr><td colspan="10" style="padding:40px;text-align:center;color:var(--t3)">Nenhum</td></tr>`;
    html+=`</tbody></table></div>${pgr(filtered.length)}</div>`}
  c.innerHTML=html}

  mk(D.mapaArr.map(m=>({"Banco":m.banco,Contratos:m.n,"Vlr Contrato":m.vcTotal,"Troco Total":m.total})),"Mapa");
  mk(D.rmcRcc.map(r=>({Nome:r.nome,CPF:r.cpf,Espécie:r.esp,Tel1:r.t1,"Tipo RMC":r.tRmc,"Banco RMC":r.cRmc,"Valor RMC":r.vRmc,"Tipo RCC":r.tRcc,"Banco RCC":r.cRcc,"Valor RCC":r.vRcc})),"RMC-RCC");
  for(let[n,cod]of Object.entries(CARTAO))mk(D.rmcRcc.filter(r=>r.cRmc===cod||r.cRcc===cod).map(r=>({Nome:r.nome,CPF:r.cpf,Tel1:r.t1,"Tipo RMC":r.tRmc,"Banco RMC":r.cRmc,"Valor RMC":r.vRmc,"Tipo RCC":r.tRcc,"Banco RCC":r.cRcc,"Valor RCC":r.vRcc})),`RMC ${n}`);
  XLSX.writeFile(wb,"lhamascred_resultado.xlsx")}
