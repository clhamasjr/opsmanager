<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpsManager</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#F5F7FA;color:#1E293B;font-family:'Outfit',sans-serif}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#F5F7FA}
    ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
    select option{background:#FFFFFF;color:#1E293B}
    /* RESPONSIVE */
    @media(max-width:768px){
      .sidebar{width:60px!important;overflow:hidden}
      .sidebar h1,.sidebar div>div:not(:first-child),.sidebar nav button span:last-child{display:none!important}
      .sidebar nav button{justify-content:center;padding:8px!important}
      .main-content{padding:12px 10px!important}
      .rg3{grid-template-columns:1fr!important}
      .rg2{grid-template-columns:1fr!important}
      .rg4{grid-template-columns:1fr 1fr!important}
      .rg6{grid-template-columns:1fr 1fr 1fr!important}
      .rflex>*{min-width:calc(50% - 4px)!important}
      form[style*="grid"]{grid-template-columns:1fr 1fr!important}
      table{font-size:9px!important}
      table th,table td{padding:4px 6px!important}
      h2{font-size:16px!important}
    }
    @media(max-width:480px){
      .rg4{grid-template-columns:1fr!important}
      .rg6{grid-template-columns:1fr 1fr!important}
      .rflex>*{min-width:100%!important}
      form[style*="grid"]{grid-template-columns:1fr!important}
    }
    @media(min-width:769px) and (max-width:1024px){
      .sidebar{width:170px!important}
      .rg3{grid-template-columns:1fr 1fr!important}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
